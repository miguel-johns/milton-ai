<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Them — reporting</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: 'DM Sans', system-ui, sans-serif; }

  .card-wrap {
    width: 100%;
    max-width: 560px;
    aspect-ratio: 560 / 360;
    position: relative;
    overflow: hidden;
    margin: 0 auto;
  }

  .card {
    --card-bg: #EAEEF3;
    --surface: #FFFFFF;
    --line: #E1E6EE;
    --muted-0: #E4E9F0;
    --muted-1: #D2D9E3;
    --muted-2: #AEB7C6;
    --muted-3: #828C9D;
    --muted-4: #5F6878;
    --ink: #3F4856;
    --cursor: #2A323F;

    position: absolute;
    top: 0;
    left: 0;
    transform-origin: top left;
    width: 560px;
    height: 360px;
    background: var(--card-bg);
    border-radius: 20px;
    overflow: hidden;
    box-sizing: border-box;
    color: var(--ink);
  }
  .card *, .card *::before, .card *::after { box-sizing: border-box; }

  /* ---------- Step bar ---------- */
  .card .step-bar {
    position: absolute;
    top: 18px;
    left: 24px;
    right: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 60;
    height: 14px;
  }
  .card .step-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.16em;
    color: var(--muted-3);
    font-weight: 500;
    text-transform: uppercase;
  }
  .card .step-divider { width: 1px; height: 10px; background: var(--muted-2); }
  .card .step-action {
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px;
    letter-spacing: 0.02em;
    color: var(--ink);
    font-weight: 500;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .card .step-action.fading { opacity: 0; transform: translateY(-3px); }

  /* ---------- Tabs ---------- */
  .card .tabs {
    position: absolute;
    top: 44px;
    left: 24px;
    right: 24px;
    display: flex;
    gap: 6px;
    height: 26px;
    z-index: 10;
  }
  .card .tab {
    flex: 1;
    background: var(--muted-0);
    border-radius: 5px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 7px;
    transition: background 0.25s ease;
    opacity: 0.85;
  }
  .card .tab.active {
    background: var(--surface);
    opacity: 1;
    box-shadow: 0 1px 3px rgba(20, 30, 50, 0.06);
  }
  .card .tab-icon {
    width: 12px;
    height: 12px;
    color: var(--muted-2);
    flex-shrink: 0;
    transition: color 0.25s ease;
  }
  .card .tab.active .tab-icon { color: var(--muted-4); }
  .card .tab-label {
    height: 4px;
    background: var(--muted-1);
    border-radius: 1.5px;
    transition: background 0.25s ease;
    width: 60px;
  }
  .card .tab.active .tab-label { background: var(--muted-3); }
  .card .tab-icon svg { display: block; width: 100%; height: 100%; }

  /* ---------- Main content area ---------- */
  .card .main {
    position: absolute;
    top: 80px;
    left: 24px;
    right: 24px;
    bottom: 24px;
    background: var(--surface);
    border-radius: 8px;
    overflow: hidden;
  }
  .card .view {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .card .view.active { opacity: 1; }

  /* ===== view-source ===== */
  .card .view-source {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card .source-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card .source-title {
    height: 7px;
    width: 100px;
    background: var(--muted-3);
    border-radius: 2px;
  }
  .card .export-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 9px;
    background: var(--muted-0);
    border-radius: 4px;
    transition: background 0.2s ease, transform 0.15s ease;
  }
  .card .export-btn.active { background: var(--muted-3); }
  .card .export-btn.pressed { transform: scale(0.96); }
  .card .export-icon {
    width: 9px;
    height: 9px;
    color: var(--muted-3);
    transition: color 0.25s ease;
  }
  .card .export-btn.active .export-icon { color: var(--surface); }
  .card .export-icon svg { display: block; width: 100%; height: 100%; }
  .card .export-label {
    height: 4px;
    width: 30px;
    background: var(--muted-3);
    border-radius: 1.5px;
    transition: background 0.25s ease;
  }
  .card .export-btn.active .export-label { background: var(--surface); }

  .card .kpi-row {
    display: flex;
    gap: 8px;
  }
  .card .kpi-card {
    flex: 1;
    background: var(--muted-0);
    border-radius: 6px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .card .kpi-label { height: 4px; width: 50%; background: var(--muted-2); border-radius: 1.5px; }
  .card .kpi-value { height: 9px; width: 70%; background: var(--muted-3); border-radius: 2px; }
  .card .kpi-trend { height: 4px; width: 35%; background: var(--muted-1); border-radius: 1.5px; }

  .card .source-chart-preview {
    flex: 1;
    background: var(--muted-0);
    border-radius: 6px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 0;
  }
  .card .preview-title {
    height: 4px;
    width: 70px;
    background: var(--muted-2);
    border-radius: 1.5px;
  }
  .card .preview-bars {
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    gap: 6px;
    padding: 4px 0;
  }
  .card .preview-bar {
    flex: 1;
    background: var(--muted-2);
    border-radius: 2px 2px 0 0;
    max-width: 24px;
  }

  /* Download toast */
  .card .download-toast {
    position: absolute;
    top: 12px;
    right: 14px;
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface);
    border: 1px solid var(--muted-1);
    border-radius: 999px;
    padding: 5px 9px;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 5;
    pointer-events: none;
    box-shadow: 0 4px 14px rgba(20, 30, 50, 0.1);
  }
  .card .download-toast.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .card .toast-icon {
    width: 9px;
    height: 9px;
    color: var(--muted-3);
  }
  .card .toast-icon svg { display: block; width: 100%; height: 100%; }
  .card .toast-bar {
    height: 4px;
    width: 50px;
    background: var(--muted-2);
    border-radius: 1.5px;
  }

  /* ===== view-sheets ===== */
  .card .view-sheets {
    padding: 0;
    display: flex;
    flex-direction: column;
  }
  .card .sheet-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-bottom: 1px solid var(--line);
    height: 28px;
  }
  .card .toolbar-icon {
    width: 12px;
    height: 12px;
    color: var(--muted-2);
    transition: color 0.25s ease, background 0.25s ease;
    border-radius: 3px;
    padding: 1px;
  }
  .card .toolbar-icon.active { color: var(--muted-4); background: var(--muted-0); }
  .card .toolbar-icon svg { display: block; width: 100%; height: 100%; }
  .card .toolbar-divider {
    width: 1px;
    height: 12px;
    background: var(--line);
  }
  .card .sheet-body {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  /* Cell grid */
  .card .sheet-grid {
    flex: 1.05;
    padding: 6px 8px;
    display: flex;
    flex-direction: column;
    gap: 0;
    border-right: 1px solid var(--line);
  }
  .card .grid-row {
    display: grid;
    grid-template-columns: 22px repeat(4, 1fr);
    align-items: center;
    height: 22px;
    border-bottom: 1px solid var(--muted-0);
  }
  .card .grid-row.header .grid-cell { background: var(--muted-0); }
  .card .grid-row.header .cell-content { background: var(--muted-3); }
  .card .grid-cell {
    height: 100%;
    border-right: 1px solid var(--muted-0);
    padding: 0 5px;
    display: flex;
    align-items: center;
  }
  .card .grid-cell.row-label {
    background: var(--muted-0);
    justify-content: center;
  }
  .card .grid-cell.row-label .cell-content {
    background: var(--muted-2);
    width: 8px;
  }
  .card .cell-content {
    height: 4px;
    background: var(--muted-1);
    border-radius: 1px;
    width: 0%;
    transition: width 0.4s ease;
    max-width: 50px;
  }
  .card .grid-row.populated .cell-content { width: 60%; }
  .card .grid-row.populated .grid-cell:nth-child(3) .cell-content { width: 70%; }
  .card .grid-row.populated .grid-cell:nth-child(4) .cell-content { width: 45%; }
  .card .grid-row.populated .grid-cell:nth-child(5) .cell-content { width: 55%; }
  .card .grid-row.selected { background: var(--muted-0); }

  /* Chart area */
  .card .sheet-chart-area {
    flex: 1;
    padding: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .card .sheet-chart {
    width: 100%;
    height: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 10px 8px 8px;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: scale(0.95);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .card .sheet-chart.visible { opacity: 1; transform: scale(1); }
  .card .chart-title-bar {
    height: 4px;
    width: 0px;
    background: var(--muted-3);
    border-radius: 1.5px;
    margin-bottom: 5px;
    transition: width 0.4s ease;
  }
  .card .sheet-chart.formatted .chart-title-bar { width: 60px; }
  .card .chart-body {
    flex: 1;
    display: flex;
    position: relative;
    padding-left: 12px;
    padding-bottom: 10px;
  }
  .card .chart-y-axis {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 10px;
    width: 10px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: flex-end;
    padding: 2px 0;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .card .sheet-chart.formatted .chart-y-axis { opacity: 1; }
  .card .y-tick {
    height: 2px;
    width: 6px;
    background: var(--muted-2);
    border-radius: 1px;
  }
  .card .chart-bars {
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    gap: 4px;
    padding-bottom: 2px;
    border-bottom: 1px solid var(--muted-1);
    border-left: 1px solid var(--muted-1);
    padding-left: 4px;
  }
  .card .sheet-chart.formatted .chart-bars {
    border-bottom-color: var(--muted-2);
    border-left-color: var(--muted-2);
  }
  .card .chart-bar {
    flex: 1;
    background: var(--muted-1);
    max-width: 12px;
    border-radius: 1.5px 1.5px 0 0;
    transition: background 0.4s ease, height 0.4s ease;
  }
  .card .sheet-chart.formatted .chart-bar { background: var(--muted-3); }
  .card .sheet-chart.formatted .chart-bar.peak { background: var(--muted-4); }
  .card .chart-x-axis {
    display: flex;
    justify-content: space-around;
    gap: 4px;
    padding-left: 16px;
    margin-top: 3px;
    height: 4px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .card .sheet-chart.formatted .chart-x-axis { opacity: 1; }
  .card .x-tick {
    flex: 1;
    height: 2.5px;
    max-width: 12px;
    background: var(--muted-2);
    border-radius: 1px;
  }

  /* Range selection highlight */
  .card .range-highlight {
    position: absolute;
    border: 1.5px dashed var(--muted-3);
    border-radius: 3px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 4;
  }
  .card .range-highlight.visible { opacity: 1; }

  /* ===== view-email ===== */
  .card .view-email {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card .email-field {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid var(--muted-0);
  }
  .card .email-field-label {
    height: 4px;
    width: 24px;
    background: var(--muted-2);
    border-radius: 1.5px;
    flex-shrink: 0;
  }
  .card .email-field-value {
    height: 4px;
    background: var(--muted-3);
    border-radius: 1.5px;
  }
  .card .email-subject-value { width: 180px; }
  .card .email-to-value { width: 110px; }

  .card .email-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 7px;
    padding-top: 4px;
    min-height: 0;
  }
  .card .email-chart {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 7px 6px 5px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    height: 78px;
    flex-shrink: 0;
  }
  .card .email-chart-title {
    height: 3.5px;
    width: 50px;
    background: var(--muted-3);
    border-radius: 1.5px;
  }
  .card .email-chart-bars {
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    gap: 4px;
    border-bottom: 1px solid var(--muted-2);
    padding-bottom: 1px;
  }
  .card .email-chart-bar {
    flex: 1;
    background: var(--muted-3);
    max-width: 12px;
    border-radius: 1.5px 1.5px 0 0;
  }
  .card .email-chart-bar.peak { background: var(--muted-4); }
  .card .takeaways {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-height: 0;
  }
  .card .takeaway-line {
    height: 4px;
    background: var(--muted-1);
    border-radius: 1.5px;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .card .takeaway-line.visible { opacity: 1; }

  .card .email-send-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 4px;
  }
  .card .send-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 11px;
    background: var(--muted-2);
    border-radius: 4px;
    transition: background 0.2s ease, transform 0.15s ease;
  }
  .card .send-btn.active { background: var(--muted-4); }
  .card .send-btn.pressed { transform: scale(0.96); }
  .card .send-icon {
    width: 9px;
    height: 9px;
    color: var(--surface);
  }
  .card .send-icon svg { display: block; width: 100%; height: 100%; }
  .card .send-label {
    height: 4px;
    width: 22px;
    background: var(--surface);
    border-radius: 1.5px;
  }

  .card .sent-toast {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translate(-50%, 6px);
    background: var(--surface);
    border: 1px solid var(--muted-1);
    padding: 5px 12px;
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    color: var(--muted-3);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 6;
    pointer-events: none;
    box-shadow: 0 2px 8px rgba(20, 30, 50, 0.06);
  }
  .card .sent-toast.visible {
    opacity: 1;
    transform: translate(-50%, 0);
  }

  /* ---------- Cursor + click ---------- */
  .card .cursor {
    position: absolute;
    width: 14px;
    height: 18px;
    z-index: 80;
    top: 18px;
    left: 18px;
    transition: top 0.6s cubic-bezier(0.45, 0.05, 0.25, 0.95),
                left 0.6s cubic-bezier(0.45, 0.05, 0.25, 0.95);
    pointer-events: none;
  }
  .card .cursor.fast {
    transition: top 0.26s cubic-bezier(0.6, 0, 0.3, 1),
                left 0.26s cubic-bezier(0.6, 0, 0.3, 1);
  }
  .card .cursor svg {
    display: block;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.18));
  }
  .card .click {
    position: absolute;
    width: 26px;
    height: 26px;
    border: 1.5px solid var(--cursor);
    border-radius: 50%;
    z-index: 70;
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.4);
    pointer-events: none;
  }
  .card .click.fire { animation: ripple-them5 0.5s ease-out; }
  @keyframes ripple-them5 {
    0%   { opacity: 0.5; transform: translate(-50%, -50%) scale(0.3); }
    100% { opacity: 0;   transform: translate(-50%, -50%) scale(1.5); }
  }
</style>
</head>
<body>

<div class="card-wrap">
<div class="card" id="themCard">

  <!-- Step indicator -->
  <div class="step-bar">
    <span class="step-num" id="stepNum">STEP 01 / 06</span>
    <span class="step-divider"></span>
    <span class="step-action" id="stepAction">Export the data</span>
  </div>

  <!-- Three browser tabs: source app, spreadsheet, email -->
  <div class="tabs">
    <div class="tab active" id="tab1">
      <span class="tab-icon">
        <svg viewBox="0 0 12 12">
          <rect x="1.5" y="6.5" width="2.2" height="4" fill="currentColor"/>
          <rect x="4.9" y="4" width="2.2" height="6.5" fill="currentColor"/>
          <rect x="8.3" y="1.5" width="2.2" height="9" fill="currentColor"/>
        </svg>
      </span>
      <span class="tab-label"></span>
    </div>
    <div class="tab" id="tab2">
      <span class="tab-icon">
        <svg viewBox="0 0 12 12">
          <rect x="1.5" y="1.5" width="9" height="9" rx="0.6" stroke="currentColor" stroke-width="1" fill="none"/>
          <path d="M1.5 4.5 L10.5 4.5 M1.5 7.5 L10.5 7.5 M4.5 1.5 L4.5 10.5 M7.5 1.5 L7.5 10.5" stroke="currentColor" stroke-width="1" fill="none"/>
        </svg>
      </span>
      <span class="tab-label"></span>
    </div>
    <div class="tab" id="tab3">
      <span class="tab-icon">
        <svg viewBox="0 0 12 12">
          <rect x="1.5" y="3" width="9" height="6.5" rx="0.8" stroke="currentColor" stroke-width="1.1" fill="none"/>
          <path d="M2 3.5 L6 7 L10 3.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </span>
      <span class="tab-label"></span>
    </div>
  </div>

  <!-- Main content -->
  <div class="main">

    <!-- View 1: Source app -->
    <div class="view view-source active" id="viewSource">
      <div class="source-header">
        <div class="source-title"></div>
        <div class="export-btn" id="exportBtn">
          <div class="export-icon">
            <svg viewBox="0 0 9 9">
              <path d="M4.5 0.5 L4.5 6 M2 4 L4.5 6.5 L7 4 M1 8 L8 8" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
          </div>
          <div class="export-label"></div>
        </div>
      </div>

      <div class="kpi-row">
        <div class="kpi-card"><div class="kpi-label"></div><div class="kpi-value"></div><div class="kpi-trend"></div></div>
        <div class="kpi-card"><div class="kpi-label"></div><div class="kpi-value"></div><div class="kpi-trend"></div></div>
        <div class="kpi-card"><div class="kpi-label"></div><div class="kpi-value"></div><div class="kpi-trend"></div></div>
      </div>

      <div class="source-chart-preview">
        <div class="preview-title"></div>
        <div class="preview-bars">
          <div class="preview-bar" style="height: 40%;"></div>
          <div class="preview-bar" style="height: 60%;"></div>
          <div class="preview-bar" style="height: 55%;"></div>
          <div class="preview-bar" style="height: 78%;"></div>
          <div class="preview-bar" style="height: 65%;"></div>
          <div class="preview-bar" style="height: 50%;"></div>
        </div>
      </div>

      <!-- Download toast that appears when Export clicked -->
      <div class="download-toast" id="downloadToast">
        <div class="toast-icon">
          <svg viewBox="0 0 9 9">
            <path d="M4.5 0.5 L4.5 6 M2 4 L4.5 6.5 L7 4 M1 8 L8 8" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
        <div class="toast-bar"></div>
      </div>
    </div>

    <!-- View 2: Spreadsheet -->
    <div class="view view-sheets" id="viewSheets">
      <div class="sheet-toolbar">
        <div class="toolbar-icon">
          <svg viewBox="0 0 12 12"><path d="M1.5 3 L4 5.5 L1.5 8 M5 8 L10.5 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </div>
        <div class="toolbar-icon">
          <svg viewBox="0 0 12 12"><path d="M1.5 6 L4.5 6 M6.5 4 L10.5 4 M6.5 8 L10.5 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-icon" id="chartIcon">
          <svg viewBox="0 0 12 12">
            <rect x="1.5" y="6.5" width="2" height="4" fill="currentColor"/>
            <rect x="5" y="4" width="2" height="6.5" fill="currentColor"/>
            <rect x="8.5" y="1.5" width="2" height="9" fill="currentColor"/>
          </svg>
        </div>
        <div class="toolbar-icon" id="formatIcon">
          <svg viewBox="0 0 12 12"><path d="M2 2.5 L10 2.5 M2 6 L8 6 M2 9.5 L9 9.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-icon">
          <svg viewBox="0 0 12 12"><circle cx="3" cy="6" r="0.8" fill="currentColor"/><circle cx="6" cy="6" r="0.8" fill="currentColor"/><circle cx="9" cy="6" r="0.8" fill="currentColor"/></svg>
        </div>
      </div>

      <div class="sheet-body">
        <div class="sheet-grid">
          <div class="grid-row header">
            <div class="grid-cell row-label"></div>
            <div class="grid-cell"><div class="cell-content" style="width: 40%; background: var(--muted-3);"></div></div>
            <div class="grid-cell"><div class="cell-content" style="width: 50%; background: var(--muted-3);"></div></div>
            <div class="grid-cell"><div class="cell-content" style="width: 45%; background: var(--muted-3);"></div></div>
            <div class="grid-cell"><div class="cell-content" style="width: 35%; background: var(--muted-3);"></div></div>
          </div>
          <div class="grid-row" id="gr1">
            <div class="grid-cell row-label"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
          </div>
          <div class="grid-row" id="gr2">
            <div class="grid-cell row-label"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
          </div>
          <div class="grid-row" id="gr3">
            <div class="grid-cell row-label"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
          </div>
          <div class="grid-row" id="gr4">
            <div class="grid-cell row-label"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
          </div>
          <div class="grid-row" id="gr5">
            <div class="grid-cell row-label"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
            <div class="grid-cell"><div class="cell-content"></div></div>
          </div>

          <!-- Range selection highlight -->
          <div class="range-highlight" id="rangeHighlight" style="left: 30px; top: 30px; right: 6px; height: 88px;"></div>
        </div>

        <div class="sheet-chart-area">
          <div class="sheet-chart" id="sheetChart">
            <div class="chart-title-bar"></div>
            <div class="chart-body">
              <div class="chart-y-axis">
                <div class="y-tick"></div>
                <div class="y-tick"></div>
                <div class="y-tick"></div>
                <div class="y-tick"></div>
              </div>
              <div class="chart-bars">
                <div class="chart-bar" style="height: 40%;"></div>
                <div class="chart-bar" style="height: 65%;"></div>
                <div class="chart-bar peak" style="height: 85%;"></div>
                <div class="chart-bar" style="height: 55%;"></div>
                <div class="chart-bar" style="height: 70%;"></div>
              </div>
            </div>
            <div class="chart-x-axis">
              <div class="x-tick"></div>
              <div class="x-tick"></div>
              <div class="x-tick"></div>
              <div class="x-tick"></div>
              <div class="x-tick"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- View 3: Email -->
    <div class="view view-email" id="viewEmail">
      <div class="email-field">
        <div class="email-field-label"></div>
        <div class="email-field-value email-to-value"></div>
      </div>
      <div class="email-field">
        <div class="email-field-label"></div>
        <div class="email-field-value email-subject-value"></div>
      </div>

      <div class="email-body">
        <div class="email-chart">
          <div class="email-chart-title"></div>
          <div class="email-chart-bars">
            <div class="email-chart-bar" style="height: 40%;"></div>
            <div class="email-chart-bar" style="height: 65%;"></div>
            <div class="email-chart-bar peak" style="height: 85%;"></div>
            <div class="email-chart-bar" style="height: 55%;"></div>
            <div class="email-chart-bar" style="height: 70%;"></div>
          </div>
        </div>

        <div class="takeaways">
          <div class="takeaway-line" id="tl1" style="width: 90%;"></div>
          <div class="takeaway-line" id="tl2" style="width: 80%;"></div>
          <div class="takeaway-line" id="tl3" style="width: 65%;"></div>
        </div>
      </div>

      <div class="email-send-row">
        <div class="send-btn" id="sendBtn">
          <div class="send-icon">
            <svg viewBox="0 0 9 9">
              <path d="M0.5 4.5 L8.5 0.5 L4.5 8.5 L3.8 5.2 L0.5 4.5 Z" stroke="currentColor" stroke-width="0.8" stroke-linejoin="round" fill="currentColor"/>
            </svg>
          </div>
          <div class="send-label"></div>
        </div>
      </div>

      <div class="sent-toast" id="sentToast">Sent</div>
    </div>
  </div>

  <!-- Cursor + click ripple -->
  <div class="cursor" id="cursor">
    <svg viewBox="0 0 14 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M1 1 L1 13.5 L4 10.5 L6.5 16 L8.5 15 L6 9.5 L10.5 9 Z"
            fill="#2A323F" stroke="#ffffff" stroke-width="0.6" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="click" id="click"></div>
</div>
</div>

<script>
(function () {
  const root = document.getElementById('themCard');
  const $ = (id) => root.querySelector('#' + id);

  // Responsive scaling
  function fitCard() {
    const wrap = root.parentElement;
    if (!wrap) return;
    const scale = Math.min(1, wrap.clientWidth / 560);
    root.style.transform = 'scale(' + scale + ')';
  }
  fitCard();
  if (window.ResizeObserver) {
    new ResizeObserver(fitCard).observe(root.parentElement);
  } else {
    window.addEventListener('resize', fitCard);
  }

  const cursor   = $('cursor');
  const click    = $('click');
  const stepNum  = $('stepNum');
  const stepAct  = $('stepAction');

  const tabs = [$('tab1'), $('tab2'), $('tab3')];
  const views = {
    source: $('viewSource'),
    sheets: $('viewSheets'),
    email:  $('viewEmail'),
  };

  const exportBtn    = $('exportBtn');
  const downloadToast= $('downloadToast');
  const gridRows     = [$('gr1'), $('gr2'), $('gr3'), $('gr4'), $('gr5')];
  const rangeHighlight = $('rangeHighlight');
  const sheetChart   = $('sheetChart');
  const chartIcon    = $('chartIcon');
  const formatIcon   = $('formatIcon');
  const takeawayLines= [$('tl1'), $('tl2'), $('tl3')];
  const sendBtn      = $('sendBtn');
  const sentToast    = $('sentToast');

  function moveCursor(x, y, fast) {
    cursor.classList.toggle('fast', !!fast);
    cursor.style.left = x + 'px';
    cursor.style.top = y + 'px';
  }
  function fireClick(x, y) {
    click.style.left = x + 'px';
    click.style.top = y + 'px';
    click.classList.remove('fire');
    void click.offsetWidth;
    click.classList.add('fire');
  }
  function setStep(n, text) {
    stepAct.classList.add('fading');
    setTimeout(() => {
      stepNum.textContent = 'STEP ' + String(n).padStart(2, '0') + ' / 06';
      stepAct.textContent = text;
      stepAct.classList.remove('fading');
    }, 180);
  }
  function setActiveTab(idx) {
    tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
  }
  function showView(name) {
    Object.entries(views).forEach(([k, v]) => v.classList.toggle('active', k === name));
  }

  function reset() {
    setActiveTab(0);
    showView('source');
    exportBtn.classList.remove('active');
    exportBtn.classList.remove('pressed');
    downloadToast.classList.remove('visible');
    gridRows.forEach(r => r.classList.remove('populated'));
    rangeHighlight.classList.remove('visible');
    sheetChart.classList.remove('visible');
    sheetChart.classList.remove('formatted');
    chartIcon.classList.remove('active');
    formatIcon.classList.remove('active');
    takeawayLines.forEach(l => l.classList.remove('visible'));
    sendBtn.classList.remove('active');
    sendBtn.classList.remove('pressed');
    sentToast.classList.remove('visible');
    moveCursor(20, 22, true);
  }

  function run() {
    reset();

    // ============ Scene 1: Export the data ============
    setTimeout(() => { setStep(1, 'Export the data'); moveCursor(490, 100); }, 100);
    setTimeout(() => {
      exportBtn.classList.add('active');
      exportBtn.classList.add('pressed');
      fireClick(490, 100);
    }, 700);
    setTimeout(() => exportBtn.classList.remove('pressed'), 900);
    setTimeout(() => downloadToast.classList.add('visible'), 1050);

    // ============ Scene 2: Open a spreadsheet ============
    setTimeout(() => { setStep(2, 'Open a spreadsheet'); moveCursor(280, 57, true); }, 1900);
    setTimeout(() => fireClick(280, 57), 2300);
    setTimeout(() => {
      setActiveTab(1);
      showView('sheets');
    }, 2450);
    // Cells fill row by row
    setTimeout(() => gridRows[0].classList.add('populated'), 2700);
    setTimeout(() => gridRows[1].classList.add('populated'), 2850);
    setTimeout(() => gridRows[2].classList.add('populated'), 3000);
    setTimeout(() => gridRows[3].classList.add('populated'), 3150);
    setTimeout(() => gridRows[4].classList.add('populated'), 3300);

    // ============ Scene 3: Build a chart ============
    setTimeout(() => { setStep(3, 'Build a chart'); moveCursor(150, 200, true); }, 3700);
    // Select range
    setTimeout(() => rangeHighlight.classList.add('visible'), 4000);
    setTimeout(() => fireClick(150, 200), 4150);
    // Click chart icon in toolbar
    setTimeout(() => moveCursor(82, 95, true), 4400);
    setTimeout(() => {
      chartIcon.classList.add('active');
      fireClick(82, 95);
    }, 4750);
    // Chart appears (unformatted)
    setTimeout(() => sheetChart.classList.add('visible'), 4950);
    setTimeout(() => rangeHighlight.classList.remove('visible'), 5300);

    // ============ Scene 4: Format it ============
    setTimeout(() => { setStep(4, 'Format it'); moveCursor(108, 95, true); }, 5700);
    setTimeout(() => {
      formatIcon.classList.add('active');
      fireClick(108, 95);
    }, 6100);
    // Chart transforms to formatted state
    setTimeout(() => sheetChart.classList.add('formatted'), 6250);
    // Cursor wanders the chart making "adjustments"
    setTimeout(() => moveCursor(420, 200, true), 6600);
    setTimeout(() => fireClick(420, 200), 6900);

    // ============ Scene 5: Write the takeaways ============
    setTimeout(() => { setStep(5, 'Write the takeaways'); moveCursor(447, 57, true); }, 7300);
    setTimeout(() => fireClick(447, 57), 7700);
    setTimeout(() => {
      setActiveTab(2);
      showView('email');
    }, 7850);
    setTimeout(() => moveCursor(280, 250, true), 8100);
    setTimeout(() => {
      fireClick(280, 250);
      takeawayLines[0].classList.add('visible');
    }, 8400);
    setTimeout(() => takeawayLines[1].classList.add('visible'), 8650);
    setTimeout(() => takeawayLines[2].classList.add('visible'), 8900);

    // ============ Scene 6: Send the email ============
    setTimeout(() => { setStep(6, 'Send the email'); moveCursor(485, 305, true); }, 9300);
    setTimeout(() => sendBtn.classList.add('active'), 9700);
    setTimeout(() => {
      sendBtn.classList.add('pressed');
      fireClick(485, 305);
    }, 9950);
    setTimeout(() => sendBtn.classList.remove('pressed'), 10150);
    setTimeout(() => sentToast.classList.add('visible'), 10250);

    // Hold, then loop
    setTimeout(run, 12500);
  }

  run();
})();
</script>
</body>
</html>

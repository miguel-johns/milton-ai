<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Them — program building</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: transparent; width: 100%; height: 100%; overflow: hidden; }
  body { font-family: 'DM Sans', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; }

  .scale-wrapper {
    width: 580px;
    height: 340px;
    transform-origin: center center;
  }

  .card {
    --card-bg: #EAEEF3;
    --surface: #FFFFFF;
    --line: #E1E6EE;
    --muted-0: #E4E9F0;
    --muted-1: #D2D9E3;
    --muted-2: #AEB7C6;
    --muted-3: #828C9D;
    --muted-4: #5F6878;
    --ink: #3F4856;
    --cursor: #2A323F;

    width: 100%;
    height: 100%;
    background: var(--card-bg);
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    box-sizing: border-box;
    color: var(--ink);
  }
  .card *, .card *::before, .card *::after { box-sizing: border-box; }

  .card .step-bar {
    position: absolute;
    top: 16px;
    left: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 60;
    height: 14px;
  }
  .card .step-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.16em;
    color: var(--muted-3);
    font-weight: 500;
    text-transform: uppercase;
  }
  .card .step-divider {
    width: 1px;
    height: 10px;
    background: var(--muted-2);
  }
  .card .step-action {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 0.02em;
    color: var(--ink);
    font-weight: 500;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .card .step-action.fading {
    opacity: 0;
    transform: translateY(-3px);
  }

  .card .ui {
    position: absolute;
    top: 42px;
    left: 20px;
    right: 20px;
    bottom: 20px;
  }

  .card .sidebar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 80px;
    background: var(--surface);
    border-radius: 6px;
    padding: 8px 6px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .card .lib-header {
    height: 4px;
    width: 60%;
    background: var(--muted-2);
    border-radius: 2px;
    margin-bottom: 3px;
  }
  .card .lib-item {
    height: 11px;
    background: var(--muted-1);
    border-radius: 3px;
    position: relative;
    transition: opacity 0.4s, background 0.3s;
  }
  .card .lib-item::before {
    content: '';
    position: absolute;
    left: 3px;
    top: 3px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--muted-2);
  }
  .card .lib-item.taken { opacity: 0.35; }

  .card .canvas {
    position: absolute;
    left: 88px;
    right: 100px;
    top: 0;
    bottom: 0;
    background: var(--surface);
    border-radius: 6px;
    padding: 12px;
    overflow: hidden;
  }
  .card .canvas-header {
    height: 4px;
    width: 38%;
    background: var(--muted-2);
    border-radius: 2px;
    margin-bottom: 10px;
    transition: opacity 0.3s;
  }
  .card .canvas-empty {
    position: absolute;
    left: 12px;
    right: 12px;
    top: 28px;
    bottom: 12px;
    border: 1.4px dashed var(--muted-1);
    border-radius: 5px;
    opacity: 1;
    transition: opacity 0.35s ease;
  }
  .card .canvas-empty::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 4px;
    background: var(--muted-1);
    border-radius: 2px;
  }
  .card .canvas-blocks {
    display: flex;
    flex-direction: column;
    gap: 5px;
    position: relative;
    z-index: 2;
  }
  .card .canvas-block {
    height: 10px;
    background: var(--muted-2);
    border-radius: 3px;
    opacity: 0;
    transform: translateX(-32px);
    transition: opacity 0.35s ease, transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card .dropdown {
    position: absolute;
    top: 8px;
    left: 8px;
    width: 120px;
    background: var(--surface);
    border-radius: 5px;
    padding: 5px;
    box-shadow: 0 6px 24px rgba(20, 30, 50, 0.12);
    display: flex;
    flex-direction: column;
    gap: 3px;
    z-index: 30;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.22s, transform 0.22s;
    pointer-events: none;
  }
  .card .dropdown-item {
    height: 10px;
    background: var(--muted-1);
    border-radius: 2px;
    transition: background 0.2s;
  }
  .card .dropdown-item.selected { background: var(--muted-3); }

  .card .week-grid {
    position: absolute;
    left: 12px;
    right: 12px;
    top: 28px;
    bottom: 12px;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    opacity: 0;
    transition: opacity 0.35s ease;
    pointer-events: none;
  }
  .card .week-day {
    background: var(--muted-0);
    border-radius: 2px;
    padding: 3px 2px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .card .week-day-bar {
    height: 3px;
    background: var(--muted-1);
    border-radius: 1px;
    opacity: 0;
    transition: opacity 0.25s ease, background 0.2s;
  }
  .card .week-day-bar.filled { opacity: 1; background: var(--muted-2); }
  .card .week-day-bar.adjusted { background: var(--muted-3); }

  .card .assign-pop {
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 110px;
    background: var(--surface);
    border-radius: 5px;
    padding: 5px;
    box-shadow: 0 6px 24px rgba(20, 30, 50, 0.12);
    display: flex;
    flex-direction: column;
    gap: 3px;
    z-index: 30;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.22s, transform 0.22s;
    pointer-events: none;
  }
  .card .assign-item {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 2px;
    border-radius: 2px;
    transition: background 0.2s;
  }
  .card .assign-item.selected { background: var(--muted-0); }
  .card .assign-avatar {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted-2);
    flex-shrink: 0;
  }
  .card .assign-name {
    height: 4px;
    flex: 1;
    background: var(--muted-1);
    border-radius: 1.5px;
  }
  .card .assign-item.selected .assign-name { background: var(--muted-3); }

  .card .notification {
    position: absolute;
    inset: 0;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    opacity: 0;
    z-index: 25;
    transition: opacity 0.45s ease;
    pointer-events: none;
  }
  .card .notif-card {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--card-bg);
    border-radius: 999px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.35s ease, transform 0.35s ease, background 0.4s ease;
  }
  .card .notif-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted-3);
    transition: background 0.4s ease;
  }
  .card .notif-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    color: var(--muted-4);
    letter-spacing: 0.03em;
    transition: color 0.4s ease;
  }
  .card .notif-final {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--muted-3);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s;
    letter-spacing: 0.01em;
  }

  .card .inputs {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 92px;
    background: var(--surface);
    border-radius: 6px;
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card .input-row { display: flex; flex-direction: column; gap: 3px; }
  .card .input-label {
    height: 3px;
    width: 50%;
    background: var(--muted-2);
    border-radius: 1.5px;
  }
  .card .input-field {
    height: 16px;
    background: var(--muted-1);
    border-radius: 3px;
    position: relative;
    overflow: hidden;
    transition: background 0.25s;
  }
  .card .input-field::after {
    content: '';
    position: absolute;
    left: 5px;
    top: 5px;
    height: 6px;
    width: 0%;
    background: var(--muted-3);
    border-radius: 1px;
    transition: width 0.5s cubic-bezier(0.5, 0, 0.3, 1);
  }
  .card .input-field.filled::after { width: 60%; }
  .card .save-row { margin-top: auto; }
  .card .save-btn {
    height: 20px;
    background: var(--muted-1);
    border-radius: 4px;
    transition: background 0.25s ease, transform 0.15s ease;
    position: relative;
  }
  .card .save-btn.pressed {
    background: var(--muted-3);
    transform: scale(0.96);
  }

  .card .cursor {
    position: absolute;
    width: 12px;
    height: 16px;
    z-index: 80;
    top: 16px;
    left: 16px;
    transition: top 0.6s cubic-bezier(0.45, 0.05, 0.25, 0.95),
                left 0.6s cubic-bezier(0.45, 0.05, 0.25, 0.95);
    pointer-events: none;
  }
  .card .cursor.fast {
    transition: top 0.28s cubic-bezier(0.6, 0, 0.3, 1),
                left 0.28s cubic-bezier(0.6, 0, 0.3, 1);
  }
  .card .cursor svg {
    display: block;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.18));
  }

  .card .click {
    position: absolute;
    width: 22px;
    height: 22px;
    border: 1.5px solid var(--cursor);
    border-radius: 50%;
    z-index: 70;
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.4);
    pointer-events: none;
  }
  .card .click.fire { animation: ripple-them 0.5s ease-out; }
  @keyframes ripple-them {
    0%   { opacity: 0.5; transform: translate(-50%, -50%) scale(0.3); }
    100% { opacity: 0;   transform: translate(-50%, -50%) scale(1.5); }
  }
</style>
</head>
<body>
  
  <div class="scale-wrapper" id="scaleWrapper">
  <div class="card" id="themCard">
  <div class="step-bar">
    <span class="step-num" id="stepNum">STEP 01 / 10</span>
    <span class="step-divider"></span>
    <span class="step-action" id="stepAction">Open the builder</span>
  </div>

  <div class="ui">
    <div class="sidebar">
      <div class="lib-header"></div>
      <div class="lib-item" id="li1"></div>
      <div class="lib-item" id="li2"></div>
      <div class="lib-item" id="li3"></div>
      <div class="lib-item" id="li4"></div>
      <div class="lib-item" id="li5"></div>
      <div class="lib-item" id="li6"></div>
      <div class="lib-item" id="li7"></div>
    </div>

    <div class="canvas">
      <div class="canvas-header" id="canvasHeader"></div>
      <div class="canvas-empty" id="canvasEmpty"></div>

      <div class="canvas-blocks" id="canvasBlocks">
        <div class="canvas-block" id="b1"></div>
        <div class="canvas-block" id="b2"></div>
        <div class="canvas-block" id="b3"></div>
        <div class="canvas-block" id="b4"></div>
      </div>

      <div class="week-grid" id="weekGrid"></div>

      <div class="dropdown" id="dropdown">
        <div class="dropdown-item"></div>
        <div class="dropdown-item selected" id="ddSel"></div>
        <div class="dropdown-item"></div>
        <div class="dropdown-item"></div>
      </div>

      <div class="assign-pop" id="assignPop">
        <div class="assign-item"><div class="assign-avatar"></div><div class="assign-name"></div></div>
        <div class="assign-item selected" id="assignSel"><div class="assign-avatar"></div><div class="assign-name"></div></div>
        <div class="assign-item"><div class="assign-avatar"></div><div class="assign-name"></div></div>
      </div>

      <div class="notification" id="notification">
        <div class="notif-card" id="notifCard">
          <div class="notif-dot" id="notifDot"></div>
          <div class="notif-text" id="notifText">Sent to client</div>
        </div>
        <div class="notif-final" id="notifFinal">Not opened.</div>
      </div>
    </div>

    <div class="inputs">
      <div class="input-row"><div class="input-label"></div><div class="input-field" id="in1"></div></div>
      <div class="input-row"><div class="input-label"></div><div class="input-field" id="in2"></div></div>
      <div class="input-row"><div class="input-label"></div><div class="input-field" id="in3"></div></div>
      <div class="input-row"><div class="input-label"></div><div class="input-field" id="in4"></div></div>
      <div class="save-row"><div class="save-btn" id="saveBtn"></div></div>
    </div>
  </div>

  <div class="cursor" id="cursor">
    <svg viewBox="0 0 14 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M1 1 L1 13.5 L4 10.5 L6.5 16 L8.5 15 L6 9.5 L10.5 9 Z"
            fill="#2A323F" stroke="#ffffff" stroke-width="0.6" stroke-linejoin="round"/>
    </svg>
  </div>
<div class="click" id="click"></div>
  </div>
  </div><!-- end scale-wrapper -->
  
<script>
  // Responsive scaling
  (function() {
    const wrapper = document.getElementById('scaleWrapper');
    const baseWidth = 580;
    const baseHeight = 340;
    
    function resize() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const scaleX = vw / baseWidth;
      const scaleY = vh / baseHeight;
      const scale = Math.min(scaleX, scaleY, 1); // Don't scale up, only down
      wrapper.style.transform = 'scale(' + scale + ')';
    }
    
    resize();
    window.addEventListener('resize', resize);
  })();
</script>

<script>
(function () {
  const root = document.getElementById('themCard');
  const $ = (id) => root.querySelector('#' + id);

  const weekGrid = $('weekGrid');
  for (let d = 0; d < 7; d++) {
    const day = document.createElement('div');
    day.className = 'week-day';
    for (let s = 0; s < 4; s++) {
      const bar = document.createElement('div');
      bar.className = 'week-day-bar';
      day.appendChild(bar);
    }
    weekGrid.appendChild(day);
  }

  const cursor       = $('cursor');
  const click        = $('click');
  const stepNum      = $('stepNum');
  const stepAct      = $('stepAction');
  const dropdown     = $('dropdown');
  const assignPop    = $('assignPop');
  const canvasEmpty  = $('canvasEmpty');
  const canvasBlocks = $('canvasBlocks');
  const canvasHeader = $('canvasHeader');
  const notification = $('notification');
  const notifCard    = $('notifCard');
  const notifDot     = $('notifDot');
  const notifText    = $('notifText');
  const notifFinal   = $('notifFinal');
  const saveBtn      = $('saveBtn');
  const blocks       = [$('b1'), $('b2'), $('b3'), $('b4')];
  const inputs       = [$('in1'), $('in2'), $('in3'), $('in4')];
  const libItems     = [1,2,3,4,5,6,7].map(i => $('li' + i));

  function moveCursor(x, y, fast) {
    cursor.classList.toggle('fast', !!fast);
    cursor.style.left = x + 'px';
    cursor.style.top  = y + 'px';
  }
  function fireClick(x, y) {
    click.style.left = x + 'px';
    click.style.top  = y + 'px';
    click.classList.remove('fire');
    void click.offsetWidth;
    click.classList.add('fire');
  }
  function setStep(n, text) {
    stepAct.classList.add('fading');
    setTimeout(() => {
      stepNum.textContent = 'STEP ' + String(n).padStart(2, '0') + ' / 10';
      stepAct.textContent = text;
      stepAct.classList.remove('fading');
    }, 180);
  }
  function reset() {
    libItems.forEach(li => li.classList.remove('taken'));
    blocks.forEach(b => { b.style.opacity = 0; b.style.transform = 'translateX(-32px)'; });
    inputs.forEach(i => { i.classList.remove('filled'); });
    dropdown.style.opacity = 0; dropdown.style.transform = 'translateY(-4px)';
    assignPop.style.opacity = 0; assignPop.style.transform = 'translateY(4px)';
    canvasEmpty.style.opacity = 1;
    canvasBlocks.style.opacity = 0;
    canvasHeader.style.opacity = 1;
    weekGrid.style.opacity = 0;
    weekGrid.querySelectorAll('.week-day-bar').forEach(b => {
      b.classList.remove('filled'); b.classList.remove('adjusted');
    });
    notification.style.opacity = 0;
    notifCard.style.opacity = 0; notifCard.style.transform = 'translateY(6px)';
    notifDot.style.background = '';
    notifText.textContent = 'Sent to client';
    notifText.style.color = '';
    notifFinal.style.opacity = 0; notifFinal.style.transform = 'translateY(4px)';
    saveBtn.classList.remove('pressed');
    moveCursor(16, 16, true);
  }

  function run() {
    reset();

    setTimeout(() => { setStep(1, 'Open the builder'); moveCursor(40, 50, true); }, 100);
    setTimeout(() => fireClick(40, 50), 600);
    setTimeout(() => { canvasBlocks.style.opacity = 1; }, 800);

    setTimeout(() => { setStep(2, 'Pick a template'); moveCursor(120, 60); }, 1300);
    setTimeout(() => { dropdown.style.opacity = 1; dropdown.style.transform = 'translateY(0)'; }, 1700);
    setTimeout(() => moveCursor(145, 85, true), 1900);
    setTimeout(() => fireClick(145, 85), 2250);
    setTimeout(() => { dropdown.style.opacity = 0; dropdown.style.transform = 'translateY(-4px)'; }, 2400);

    setTimeout(() => { setStep(3, 'Drag in exercises'); canvasEmpty.style.opacity = 0; }, 2700);

    setTimeout(() => moveCursor(50, 90, true), 2900);
    setTimeout(() => moveCursor(170, 90), 3150);
    setTimeout(() => {
      libItems[1].classList.add('taken');
      blocks[0].style.opacity = 1; blocks[0].style.transform = 'translateX(0)';
    }, 3500);

    setTimeout(() => moveCursor(50, 110, true), 3750);
    setTimeout(() => moveCursor(170, 105), 4000);
    setTimeout(() => {
      libItems[2].classList.add('taken');
      blocks[1].style.opacity = 1; blocks[1].style.transform = 'translateX(0)';
    }, 4350);

    setTimeout(() => moveCursor(50, 135, true), 4600);
    setTimeout(() => moveCursor(170, 120), 4850);
    setTimeout(() => {
      libItems[4].classList.add('taken');
      blocks[2].style.opacity = 1; blocks[2].style.transform = 'translateX(0)';
    }, 5200);

    setTimeout(() => setStep(4, 'Set reps, sets, tempo, rest'), 5500);
    setTimeout(() => moveCursor(380, 90), 5700);
    setTimeout(() => { inputs[0].classList.add('filled'); fireClick(380, 90); }, 6050);
    setTimeout(() => moveCursor(380, 118, true), 6250);
    setTimeout(() => { inputs[1].classList.add('filled'); fireClick(380, 118); }, 6550);
    setTimeout(() => moveCursor(380, 148, true), 6750);
    setTimeout(() => { inputs[2].classList.add('filled'); fireClick(380, 148); }, 7050);
    setTimeout(() => moveCursor(380, 176, true), 7250);
    setTimeout(() => { inputs[3].classList.add('filled'); fireClick(380, 176); }, 7550);

    setTimeout(() => setStep(5, 'Save as a block'), 7850);
    setTimeout(() => moveCursor(380, 230), 8050);
    setTimeout(() => { saveBtn.classList.add('pressed'); fireClick(380, 230); }, 8450);
    setTimeout(() => saveBtn.classList.remove('pressed'), 8650);

    setTimeout(() => {
      setStep(6, 'Build a week');
      canvasBlocks.style.opacity = 0;
      weekGrid.style.opacity = 1;
    }, 8950);
    setTimeout(() => moveCursor(150, 110, true), 9200);

    const fillSequence = [
      {d:0,s:0,t:9400},{d:0,s:1,t:9500},
      {d:1,s:0,t:9600},{d:1,s:1,t:9700},
      {d:2,s:0,t:9800},
    ];
    fillSequence.forEach(({d,s,t}) => {
      setTimeout(() => {
        weekGrid.querySelectorAll('.week-day')[d].children[s].classList.add('filled');
      }, t);
    });

    setTimeout(() => setStep(7, 'Duplicate'), 9950);
    setTimeout(() => moveCursor(230, 130, true), 10150);
    setTimeout(() => fireClick(230, 130), 10400);

    const duplicateSequence = [
      {d:3,s:0,t:10500},{d:3,s:1,t:10560},
      {d:4,s:0,t:10620},{d:4,s:1,t:10680},
      {d:2,s:1,t:10740},{d:5,s:0,t:10800},
    ];
    duplicateSequence.forEach(({d,s,t}) => {
      setTimeout(() => {
        weekGrid.querySelectorAll('.week-day')[d].children[s].classList.add('filled');
      }, t);
    });

    setTimeout(() => setStep(8, 'Adjust'), 11000);
    setTimeout(() => moveCursor(200, 145, true), 11150);
    setTimeout(() => {
      weekGrid.querySelectorAll('.week-day')[2].children[0].classList.add('adjusted');
      fireClick(200, 145);
    }, 11400);
    setTimeout(() => moveCursor(270, 165, true), 11550);
    setTimeout(() => {
      weekGrid.querySelectorAll('.week-day')[4].children[1].classList.add('adjusted');
      fireClick(270, 165);
    }, 11750);

    setTimeout(() => setStep(9, 'Assign to client'), 12000);
    setTimeout(() => { assignPop.style.opacity = 1; assignPop.style.transform = 'translateY(0)'; }, 12300);
    setTimeout(() => moveCursor(280, 220, true), 12500);
    setTimeout(() => fireClick(280, 220), 12800);
    setTimeout(() => { assignPop.style.opacity = 0; assignPop.style.transform = 'translateY(4px)'; }, 13000);

    setTimeout(() => {
      setStep(10, 'Done');
      notification.style.opacity = 1;
      notifCard.style.opacity = 1;
      notifCard.style.transform = 'translateY(0)';
    }, 13300);

    setTimeout(() => {
      notifFinal.style.opacity = 1;
      notifFinal.style.transform = 'translateY(0)';
    }, 14000);

    setTimeout(run, 17000);
  }

  run();
})();
</script>
